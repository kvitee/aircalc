name: Build on Linux

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4.0.0
      with:
        version: "5.15.2"
        host: "linux"
        target: "desktop"

    - name: Configure CMake
      run: cmake .

    - name: Build
      run: cmake --build .

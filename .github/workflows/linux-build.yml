name: Build on Linux

on:
  push:
    tags:
      - "v\\d+.\\d+.\\d+"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4.0.0
      with:
        version: "5.15.2"
        host: "linux"
        target: "desktop"

    - name: Configure CMake
      run: cmake .

    - name: Build
      run: cmake --build .

    - name: Archive builded binaries
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: bin/

    - name: Download builded binaries
      uses: actions/download-artifact@v4
      with:
        name: binaries
        path: bin/
